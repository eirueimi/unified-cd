# ローカル開発用 Dex 設定
# 静的ユーザー: admin@example.com / password
issuer: http://localhost:5556

storage:
  type: memory

web:
  http: 0.0.0.0:5556

oauth2:
  skipApprovalScreen: true

staticClients:
  - id: unified-cd
    secret: unified-cd-secret
    public: true
    name: unified-cd
    redirectURIs:
      - http://localhost:8080/api/v1/auth/oidc-callback
      - http://localhost:5556/device/callback

enablePasswordDB: true

staticPasswords:
  - email: admin@example.com
    # bcrypt hash of "password"
    hash: "$2a$10$jWufy4Bfprg0HLUHGNgiTOSEoCJH8fe2WZXjTDnvugwq94IB5T.fa"
    username: admin
    userID: "08a8684b-db88-4b73-90a9-3cd1661f5466"
