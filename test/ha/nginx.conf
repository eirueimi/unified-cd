events {}
http {
  upstream controllers {
    # max_fails/fail_timeout let nginx eject a dead controller from rotation quickly
    # after a failover kill, so subsequent requests skip it instead of retrying it.
    server controller1:8080 max_fails=1 fail_timeout=5s;
    server controller2:8080 max_fails=1 fail_timeout=5s;
    server controller3:8080 max_fails=1 fail_timeout=5s;
  }
  server {
    listen 8080;
    location / {
      proxy_pass http://controllers;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      # Short connect timeout so a SIGKILLed (dead) upstream fails fast and the request
      # is re-tried against a healthy controller — without this, a killed backend leaves
      # the connect hanging for the default 60s and clients time out during failover.
      proxy_connect_timeout 2s;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
      # Retry the next upstream on connect/response errors, and bound the total retries
      # and time so one request can traverse all three controllers within a few seconds.
      proxy_next_upstream error timeout http_502 http_503 http_504;
      proxy_next_upstream_tries 3;
      proxy_next_upstream_timeout 8s;
    }
  }
}
