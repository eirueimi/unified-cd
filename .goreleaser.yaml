# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

# cmd/agent go:embeds internal/shim/embedded/ucd-sh-<arch> (arch-tagged via
# embed_amd64.go / embed_arm64.go — see the package doc comment in
# internal/shim/embedded/embed.go) to inject into every job container it
# creates. The ucd-sh-<arch> files are committed, generated bytes (via `go
# generate ./...`, which runs cmd/shimgen) and are validated functionally by
# internal/shim/embedded/embed_test.go (real static linux ELF of the right
# arch; executed as ucd-sh on linux). They are embedded as-is, so no pre-build
# hook is needed here.

builds:
  - id: unified-cli
    binary: unified-cli
    main: ./cmd/unified-cli
    ldflags:
      - -s -w
      - -X github.com/eirueimi/unified-cd/internal/cli.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

  - id: controller
    binary: controller
    main: ./cmd/controller
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

  - id: agent
    binary: agent
    main: ./cmd/agent
    ldflags:
      - -s -w
      - -X github.com/eirueimi/unified-cd/internal/agent.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums-sha256.txt"
  algorithm: sha256

release:
  draft: false
  prerelease: auto
