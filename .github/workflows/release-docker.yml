name: Release Docker Images

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push controller
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/controller.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/eirueimi/unified-cd-controller:latest
            ghcr.io/eirueimi/unified-cd-controller:${{ github.ref_name }}

      - name: Build and push k8s-agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/k8s-agent.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/eirueimi/unified-cd-k8s-agent:latest
            ghcr.io/eirueimi/unified-cd-k8s-agent:${{ github.ref_name }}

      - name: Build and push runner
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/runner.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/eirueimi/unified-cd-runner:latest
            ghcr.io/eirueimi/unified-cd-runner:${{ github.ref_name }}
