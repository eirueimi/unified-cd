name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: Unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: shim placeholders must be empty in git
        if: runner.os == 'Linux'
        run: |
          test "$(git cat-file -s HEAD:internal/shim/embedded/ucd-sh-amd64)" = "0"
          test "$(git cat-file -s HEAD:internal/shim/embedded/ucd-sh-arm64)" = "0"
      - name: Run unit tests
        run: go test ./... -short -race -count=1

  integration:
    name: Integration tests (Linux + PostgreSQL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run integration tests
        run: go test ./... -race -count=1

  k8s:
    name: Kubernetes integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Start kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: ci
      - name: Load test image into kind
        run: |
          docker pull ubuntu:22.04
          kind load docker-image ubuntu:22.04 --name ci
      - name: Run k8s integration tests
        run: go test -tags k8s ./internal/k8sagent/... -timeout 10m -v
