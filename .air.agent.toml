root = "."
tmp_dir = "tmp"

[build]
  # Air watches the /app bind mount but copies it to a disposable container-local
  # tree before producing the real ucd-sh embed input. This keeps generated shim
  # bytes out of the mounted worktree while preserving the agent binary at /app/tmp.
  cmd = "rm -rf /tmp/unified-cd-agent-src && mkdir -p /tmp/unified-cd-agent-src && tar -C /app --exclude=./.git --exclude=./tmp --exclude=./internal/shim/embedded/ucd-sh-amd64 --exclude=./internal/shim/embedded/ucd-sh-arm64 -cf - . | tar -C /tmp/unified-cd-agent-src -xf - && cd /tmp/unified-cd-agent-src && sed -i 's/\\r$//' scripts/prepare-shim-placeholders.sh && ./scripts/prepare-shim-placeholders.sh && go build -o internal/shim/embedded/ucd-sh-$(go env GOARCH) ./cmd/ucd-sh && go build -o /app/tmp/unified-agent ./cmd/agent"
  bin = "./tmp/unified-agent"
  # Run two slots so a parent job (e.g. examples/jobs/call-job.yaml) and the child
  # runs it calls can execute concurrently on this single dev agent.
  full_bin = "./tmp/unified-agent --max-concurrent 2"
  delay = 1000
  include_ext = ["go"]
  exclude_dir = ["vendor", ".git", "tmp", "docs", "deployments", "web", "example", "manifests"]
  kill_delay = "3s"
  rerun = false
  # inotify does not receive events from the Windows host filesystem when running
  # inside a Docker Desktop Linux container. Use polling instead.
  poll = true
  poll_interval = 500

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
