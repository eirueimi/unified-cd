root = "."
tmp_dir = "tmp"

[build]
  # Two-stage build: overwrite the committed empty placeholder at
  # internal/shim/embedded/ucd-sh-<arch> with a real ucd-sh binary before
  # building the agent, so the matching arch-tagged go:embed
  # (embed_amd64.go / embed_arm64.go) picks it up. air runs inside the
  # linux dev container, so GOOS is already linux here — no GOOS override
  # needed (contrast the Makefile's embed-shim target, which cross-compiles
  # from the Windows host). `$(go env GOARCH)` resolves the container's
  # native arch at build time via the shell air invokes this cmd through.
  cmd = "go build -o internal/shim/embedded/ucd-sh-$(go env GOARCH) ./cmd/ucd-sh && go build -o ./tmp/unified-agent ./cmd/agent"
  bin = "./tmp/unified-agent"
  # Run two slots so a parent job (e.g. examples/jobs/call-job.yaml) and the child
  # runs it calls can execute concurrently on this single dev agent.
  full_bin = "./tmp/unified-agent --max-concurrent 2"
  delay = 1000
  include_ext = ["go"]
  exclude_dir = ["vendor", ".git", "tmp", "docs", "deployments", "web", "example", "manifests"]
  kill_delay = "3s"
  rerun = false
  # inotify does not receive events from the Windows host filesystem when running
  # inside a Docker Desktop Linux container. Use polling instead.
  poll = true
  poll_interval = 500

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
