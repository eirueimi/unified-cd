root = "."
tmp_dir = "tmp"

[build]
  # The committed linux ucd-sh binaries (internal/shim/embedded/ucd-sh-<arch>,
  # generated by `go generate ./...`) are embedded directly by cmd/unified-cd-agent — the
  # dev-container GOARCH selects the arch via build tag, so no pre-build shim
  # step is needed. If you edit cmd/ucd-sh or internal/shim, run
  # `go generate ./...` and commit before the dev agent will pick it up.
  cmd = "go build -o /app/tmp/unified-agent ./cmd/unified-cd-agent"
  bin = "./tmp/unified-agent"
  # Run two slots so a parent job (e.g. examples/jobs/call-job.yaml) and the child
  # runs it calls can execute concurrently on this single dev agent.
  full_bin = "./tmp/unified-agent --max-concurrent 2"
  delay = 1000
  include_ext = ["go"]
  exclude_dir = ["vendor", ".git", "tmp", "docs", "deployments", "web", "example", "manifests"]
  kill_delay = "3s"
  rerun = false
  # inotify does not receive events from the Windows host filesystem when running
  # inside a Docker Desktop Linux container. Use polling instead.
  poll = true
  poll_interval = 500

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
