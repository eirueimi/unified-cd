apiVersion: v1
kind: Namespace
metadata:
  name: ci
---
apiVersion: v1
kind: Namespace
metadata:
  name: unified-cd
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: unified-cd-controller
  namespace: unified-cd
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: unified-cd-k8s-agent
  namespace: unified-cd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: unified-cd-k8s-agent
  namespace: ci
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - pods/exec
  - pods/log
  verbs:
  - create
  - get
  - list
  - delete
  - watch
  - update
  - patch
- apiGroups:
  - ""
  resources:
  - persistentvolumeclaims
  verbs:
  - create
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: unified-cd-controller-kubernetes-enrollment
  namespace: unified-cd
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: unified-cd-controller-kubernetes-enrollment
rules:
- apiGroups:
  - authentication.k8s.io
  resources:
  - tokenreviews
  verbs:
  - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: unified-cd-k8s-agent
  namespace: ci
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: unified-cd-k8s-agent
subjects:
- kind: ServiceAccount
  name: unified-cd-k8s-agent
  namespace: unified-cd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: unified-cd-controller-kubernetes-enrollment
  namespace: unified-cd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: unified-cd-controller-kubernetes-enrollment
subjects:
- kind: ServiceAccount
  name: unified-cd-controller
  namespace: unified-cd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: unified-cd-controller-kubernetes-enrollment
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: unified-cd-controller-kubernetes-enrollment
subjects:
- kind: ServiceAccount
  name: unified-cd-controller
  namespace: unified-cd
---
apiVersion: v1
data:
  controller-config.yaml: |
    agentAuth:
      kubernetesClusters:
        - name: in-cluster
      kubernetesEnrollmentPolicies:
        - name: unified-cd-k8s-agents
          cluster: in-cluster
          namespaces: [unified-cd]
          serviceAccounts: [unified-cd-k8s-agent]
          allowedLabels: [kind:kubernetes]
          requiredLabels: [kind:kubernetes]
          capabilities: [pod, container]
          accessTokenTTL: 1h
          enabled: true
kind: ConfigMap
metadata:
  name: unified-cd-controller-config
  namespace: unified-cd
---
apiVersion: v1
data:
  k8s-agent-config.yaml: |
    server: https://unified-cd-controller.unified-cd.svc.cluster.local
    enrollmentPolicy: unified-cd-k8s-agents
    serviceAccountTokenFile: /var/run/secrets/unified-cd-agent/token
    labels:
      - kind:kubernetes
    namespace: ci
    maxConcurrent: 5
    podImage: golang:1.24-alpine
kind: ConfigMap
metadata:
  name: unified-cd-k8s-agent-config
  namespace: unified-cd
---
apiVersion: v1
kind: Secret
metadata:
  name: unified-cd-controller
  namespace: unified-cd
stringData:
  UNIFIED_CONTROLLER_KEY: REPLACE_WITH_32_BYTE_HEX_KEY
  UNIFIED_DB_DSN: REPLACE_WITH_POSTGRES_DSN
  UNIFIED_S3_BUCKET: REPLACE_WITH_S3_BUCKET
  UNIFIED_S3_ENDPOINT: REPLACE_WITH_S3_ENDPOINT
  UNIFIED_S3_KEY: REPLACE_WITH_S3_ACCESS_KEY
  UNIFIED_S3_SECRET: REPLACE_WITH_S3_SECRET
  UNIFIED_TOKEN: REPLACE_WITH_ADMIN_TOKEN
type: Opaque
---
apiVersion: v1
kind: Service
metadata:
  name: unified-cd-controller
  namespace: unified-cd
spec:
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: unified-cd-controller
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: unified-cd-controller
  name: unified-cd-controller
  namespace: unified-cd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unified-cd-controller
  template:
    metadata:
      labels:
        app: unified-cd-controller
    spec:
      containers:
      - args:
        - -f
        - /etc/unified-cd/controller-config.yaml
        envFrom:
        - secretRef:
            name: unified-cd-controller
        image: ghcr.io/eirueimi/unified-cd-controller:latest
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          periodSeconds: 10
        name: controller
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          periodSeconds: 10
        volumeMounts:
        - mountPath: /etc/unified-cd/controller-config.yaml
          name: controller-config
          readOnly: true
          subPath: controller-config.yaml
      serviceAccountName: unified-cd-controller
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          name: unified-cd-controller-config
        name: controller-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: unified-cd-k8s-agent
  name: unified-cd-k8s-agent
  namespace: unified-cd
spec:
  replicas: 2
  selector:
    matchLabels:
      app: unified-cd-k8s-agent
  template:
    metadata:
      labels:
        app: unified-cd-k8s-agent
    spec:
      containers:
      - env:
        - name: UNIFIED_K8S_CONFIG
          value: /etc/unified-cd/config.yaml
        image: ghcr.io/eirueimi/unified-cd-k8s-agent:latest
        name: k8s-agent
        volumeMounts:
        - mountPath: /etc/unified-cd/config.yaml
          name: config
          readOnly: true
          subPath: k8s-agent-config.yaml
        - mountPath: /var/run/secrets/unified-cd-agent
          name: enrollment-identity
          readOnly: true
      serviceAccountName: unified-cd-k8s-agent
      volumes:
      - configMap:
          name: unified-cd-k8s-agent-config
        name: config
      - name: enrollment-identity
        projected:
          sources:
          - serviceAccountToken:
              audience: unified-cd-agent-enrollment
              expirationSeconds: 3600
              path: token
