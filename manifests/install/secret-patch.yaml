apiVersion: v1
kind: Secret
metadata:
  name: unified-cd-controller
  namespace: unified-cd
  annotations:
    # kustomize strips YAML comments, so this note is an annotation: it is
    # the only way it reaches manifests/install.yaml, which is the file people
    # actually read and apply.
    unified-cd.io/kek-provenance: >-
      The secret encryption key for this bundle is generated once, at install
      time, by the unified-cd-kek-init Job (see kek-job.yaml) and stored in
      the unified-cd-controller-kek Secret in this namespace. It is created
      with `kubectl create`, not `apply`, specifically so that re-running
      `kubectl apply -f install.yaml` does NOT regenerate or replace it —
      doing so would make every secret already encrypted with the old key
      permanently unreadable. That Secret, not this one, is what makes your
      registered secrets durable: back it up. A Postgres dump alone is not
      enough to restore them, since the rows it contains are ciphertext
      without the key.
type: Opaque
stringData:
  UNIFIED_DB_DSN: "postgres://unified:unified@postgres.unified-cd.svc.cluster.local:5432/unified?sslmode=disable"
  UNIFIED_TOKEN: "dev-token-change-me"
  # No fixed key is baked into this quick-trial bundle: shipping one would put
  # the key that protects every secret into a public repository. Instead,
  # UNIFIED_CONTROLLER_KEY_FILE (inherited unmodified from core-install.yaml)
  # points at a Secret volume mount backed by unified-cd-controller-kek, and
  # that Secret is populated at install time by kek-job.yaml's Job rather
  # than shipped with a placeholder value. See that file, and
  # kek-secret-patch.yaml, for how the key is generated and why it survives
  # re-apply.
  UNIFIED_S3_ENDPOINT: "garage.unified-cd.svc.cluster.local:3900"
  UNIFIED_S3_BUCKET: "unified-cd-logs"
  UNIFIED_S3_KEY: "garageadmin"
  UNIFIED_S3_SECRET: "garageadmin12345"
