apiVersion: v1
kind: Secret
metadata:
  name: unified-cd-controller
  namespace: unified-cd
  annotations:
    # kustomize strips YAML comments, so this warning is an annotation: it is
    # the only way it reaches manifests/install.yaml, which is the file people
    # actually read and apply.
    unified-cd.io/ephemeral-key-warning: >-
      This quick-trial bundle runs with UNIFIED_DEV_MODE=1, so the secret
      encryption key is generated in memory and is LOST on every pod restart.
      Postgres here has a PersistentVolumeClaim, so the database survives that
      restart: secrets you registered remain in it, encrypted with a key that
      no longer exists, and are not recoverable. Use this bundle to evaluate
      unified-cd. For anything you intend to keep, use core-install.yaml, which
      mounts a real key from the unified-cd-controller-kek Secret (generate one
      with `unified-cli keygen`). Back that Secret up — a database dump alone
      cannot restore your secrets.
type: Opaque
stringData:
  UNIFIED_DB_DSN: "postgres://unified:unified@postgres.unified-cd.svc.cluster.local:5432/unified?sslmode=disable"
  UNIFIED_TOKEN: "dev-token-change-me"
  # No fixed key is baked into this quick-trial bundle: shipping one would put
  # the key that protects every secret into a public repository. Dev mode
  # generates an ephemeral key in memory at startup instead.
  #
  # WHAT THIS MEANS IN PRACTICE — read before storing a secret here:
  #   Postgres in this bundle has a PersistentVolumeClaim, so the database
  #   SURVIVES a pod restart, but the key does NOT. Anything registered with
  #   `unified-cli secret set` is therefore still in the database after a
  #   restart, encrypted with a key that no longer exists — unreadable, and not
  #   recoverable. The controller warns about this at startup, but the surviving
  #   rows make it easy to miss.
  #
  #   Use this bundle to try unified-cd out. For anything you intend to keep,
  #   use core-install.yaml, which mounts a real key from the
  #   unified-cd-controller-kek Secret (generate one with `unified-cli keygen`).
  #   That Secret is an etcd object: it survives pod deletion, rescheduling, and
  #   node failure. Backing it up is what makes secrets restorable — a database
  #   dump on its own is not enough.
  #
  # kek-secret-patch.yaml deletes the KEK Secret for this overlay, since dev
  # mode does not read one.
  UNIFIED_DEV_MODE: "1"
  UNIFIED_S3_ENDPOINT: "garage.unified-cd.svc.cluster.local:3900"
  UNIFIED_S3_BUCKET: "unified-cd-logs"
  UNIFIED_S3_KEY: "garageadmin"
  UNIFIED_S3_SECRET: "garageadmin12345"
