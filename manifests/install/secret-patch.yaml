apiVersion: v1
kind: Secret
metadata:
  name: unified-cd-controller
  namespace: unified-cd
type: Opaque
stringData:
  UNIFIED_DB_DSN: "postgres://unified:unified@postgres.unified-cd.svc.cluster.local:5432/unified?sslmode=disable"
  UNIFIED_TOKEN: "dev-token-change-me"
  # No fixed key is baked into this quick-trial bundle. Dev mode generates an
  # ephemeral key at startup; secrets do not survive a restart. The KEK lives
  # in its own unified-cd-controller-kek Secret (see kek-secret-patch.yaml,
  # which deletes it for this overlay) — see core-install.yaml / kek-secret.yaml
  # for the file-backed key used in production.
  UNIFIED_DEV_MODE: "1"
  UNIFIED_S3_ENDPOINT: "garage.unified-cd.svc.cluster.local:3900"
  UNIFIED_S3_BUCKET: "unified-cd-logs"
  UNIFIED_S3_KEY: "garageadmin"
  UNIFIED_S3_SECRET: "garageadmin12345"
