# This quick-trial bundle uses UNIFIED_DEV_MODE (set in secret-patch.yaml)
# instead of a file-backed key, so the unified-cd-controller-kek Secret (and
# its unused REPLACE_WITH_ placeholder) is dropped entirely, along with the
# volume/mount that referenced it (see dev-mode-patch.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: unified-cd-controller-kek
  namespace: unified-cd
$patch: delete
