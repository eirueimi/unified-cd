# The base unified-cd-controller-kek Secret ships a REPLACE_WITH_ placeholder
# value, which is fine for core-install.yaml (an operator edits it before
# applying) but wrong here: install.yaml is no-edits, so if this placeholder
# reached the cluster, `kubectl apply` would write it as the literal key on
# every apply, silently clobbering the real key generated by kek-job.yaml.
# So the placeholder is dropped here, and kek-job.yaml's Job creates the
# real Secret (via `kubectl create`, not `apply`) the first time the bundle
# is installed, then leaves it untouched on every re-apply.
apiVersion: v1
kind: Secret
metadata:
  name: unified-cd-controller-kek
  namespace: unified-cd
$patch: delete
