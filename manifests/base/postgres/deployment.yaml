apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: unified-cd
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: unified
            - name: POSTGRES_PASSWORD
              value: unified
            - name: POSTGRES_DB
              value: unified
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "unified"]
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "unified"]
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
