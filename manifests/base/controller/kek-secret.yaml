# Kept in its own Secret, separate from unified-cd-controller, so that the
# controller Deployment's `envFrom: secretRef: {name: unified-cd-controller}`
# cannot project it into the process environment. envFrom projects every key
# in the referenced Secret — putting the KEK there would silently reintroduce
# the exact env-var exposure (docker inspect, process listings, crash dumps,
# child processes such as the git subprocess used for AppSource resolution)
# that a file-mounted key was chosen to avoid. This Secret is consumed only
# via the controller-kek volume mount in deployment.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: unified-cd-controller-kek
  namespace: unified-cd
type: Opaque
stringData:
  kek: "REPLACE_WITH_64_HEX_CHARS_FROM_unified-cli_keygen"
