apiVersion: apps/v1
kind: Deployment
metadata:
  name: unified-cd-controller
  namespace: unified-cd
  labels:
    app: unified-cd-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unified-cd-controller
  template:
    metadata:
      labels:
        app: unified-cd-controller
    spec:
      serviceAccountName: unified-cd-controller
      terminationGracePeriodSeconds: 30
      containers:
        - name: controller
          image: ghcr.io/eirueimi/unified-cd-controller:latest
          args: ["-f", "/etc/unified-cd/controller-config.yaml"]
          ports:
            - containerPort: 8080
          env:
            - name: UNIFIED_CONTROLLER_KEY_FILE
              value: /etc/unified-cd/kek
          envFrom:
            - secretRef:
                name: unified-cd-controller
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            periodSeconds: 10
          volumeMounts:
            - name: controller-config
              mountPath: /etc/unified-cd/controller-config.yaml
              subPath: controller-config.yaml
              readOnly: true
            - name: controller-kek
              mountPath: /etc/unified-cd/kek
              subPath: kek
              readOnly: true
      volumes:
        - name: controller-config
          configMap:
            name: unified-cd-controller-config
        - name: controller-kek
          secret:
            secretName: unified-cd-controller-kek
            items:
              - key: kek
                path: kek
            defaultMode: 0400
