apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: unified-cd-controller-kubernetes-enrollment
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: unified-cd-controller-kubernetes-enrollment
subjects:
  - kind: ServiceAccount
    name: unified-cd-controller
    namespace: unified-cd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: unified-cd-controller-kubernetes-enrollment
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: unified-cd-controller-kubernetes-enrollment
  namespace: unified-cd
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: unified-cd-controller-kubernetes-enrollment
  namespace: unified-cd
subjects:
  - kind: ServiceAccount
    name: unified-cd-controller
    namespace: unified-cd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: unified-cd-controller-kubernetes-enrollment
