apiVersion: v1
kind: Namespace
metadata:
  name: ci
---
apiVersion: v1
kind: Namespace
metadata:
  name: unified-cd
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: unified-cd-k8s-agent
  namespace: unified-cd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: unified-cd-k8s-agent
  namespace: ci
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - pods/exec
  - pods/log
  verbs:
  - create
  - get
  - list
  - delete
  - watch
  - update
  - patch
- apiGroups:
  - ""
  resources:
  - persistentvolumeclaims
  verbs:
  - create
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: unified-cd-k8s-agent
  namespace: ci
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: unified-cd-k8s-agent
subjects:
- kind: ServiceAccount
  name: unified-cd-k8s-agent
  namespace: unified-cd
---
apiVersion: v1
data:
  k8s-agent-config.yaml: |
    server: "CHANGEME"
    enrollmentPolicy: unified-cd-k8s-agents
    serviceAccountTokenFile: /var/run/secrets/unified-cd-agent/token
    labels:
      - kind:kubernetes
    namespace: ci
    maxConcurrent: 5
    podImage: golang:1.24-alpine
kind: ConfigMap
metadata:
  name: unified-cd-k8s-agent-config
  namespace: unified-cd
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: unified-cd-k8s-agent
  name: unified-cd-k8s-agent
  namespace: unified-cd
spec:
  replicas: 2
  selector:
    matchLabels:
      app: unified-cd-k8s-agent
  template:
    metadata:
      labels:
        app: unified-cd-k8s-agent
    spec:
      containers:
      - env:
        - name: UNIFIED_K8S_CONFIG
          value: /etc/unified-cd/config.yaml
        image: ghcr.io/eirueimi/unified-cd-k8s-agent:latest
        name: k8s-agent
        volumeMounts:
        - mountPath: /etc/unified-cd/config.yaml
          name: config
          readOnly: true
          subPath: k8s-agent-config.yaml
        - mountPath: /var/run/secrets/unified-cd-agent
          name: enrollment-identity
          readOnly: true
      serviceAccountName: unified-cd-k8s-agent
      volumes:
      - configMap:
          name: unified-cd-k8s-agent-config
        name: config
      - name: enrollment-identity
        projected:
          sources:
          - serviceAccountToken:
              audience: unified-cd-agent-enrollment
              expirationSeconds: 3600
              path: token
