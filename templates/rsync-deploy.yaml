# Remote deploy job template via rsync
# Register with unified-cd apply -f templates/rsync-deploy.yaml, then invoke via call.job
#
# Agent requirements: rsync, ssh
#
# Required secrets:
#   unified-cd secret set deploy-ssh-key "$(cat ~/.ssh/id_ed25519)"
#
# When referencing as a git:// template:
#   job: git://github.com/your-org/ci-templates/rsync-deploy.yaml@v1
apiVersion: unified-cd/v1
kind: Job
metadata:
  name: rsync-deploy
spec:
  params:
    inputs:
      - name: src
        type: string
        default: "./"
        description: "Source directory to sync from (local)"
      - name: dest
        type: string
        required: true
        description: "Sync destination (e.g. user@host:/path/to/app)"
      - name: ssh_key_secret
        type: string
        required: true
        description: "Secret name holding the SSH private key"
      - name: port
        type: string
        default: "22"
        description: "SSH port"
      - name: delete
        type: string
        default: "false"
        description: "Whether to delete files from the destination that don't exist in the source (rsync --delete)"
      - name: extra_args
        type: string
        default: ""
        description: "Additional arguments to pass to rsync (space-separated, optional)"
  steps:
    - name: rsync
      env:
        SSH_KEY: "{{ index .Secrets .Params.ssh_key_secret }}"
        SRC: "{{ .Params.src }}"
        DEST: "{{ .Params.dest }}"
        PORT: "{{ .Params.port }}"
        DELETE: "{{ .Params.delete }}"
        EXTRA_ARGS: "{{ .Params.extra_args }}"
      run: |
        #!/usr/bin/env sh
        set -eu

        _SSH_KEY_FILE="$(mktemp)"
        chmod 600 "$_SSH_KEY_FILE"
        _cleanup() {
          rm -f "$_SSH_KEY_FILE"
        }
        trap _cleanup EXIT

        printf '%s\n' "$SSH_KEY" > "$_SSH_KEY_FILE"

        # PORT is embedded directly into the ssh -p / ProxyCommand string, so reject
        # it if it contains any non-digit characters, since that risks command injection
        case "$PORT" in
          *[!0-9]*|'')
            echo "[rsync-deploy] invalid port: ${PORT}" >&2
            exit 1
            ;;
        esac

        set --
        if [ "$DELETE" = "true" ]; then
          set -- "$@" --delete
        fi

        # extra_args is free-form, space-separated input, so word splitting is performed
        # as intended, but unintended glob expansion against workspace file names is
        # disabled (set -f)
        set -f
        # shellcheck disable=SC2086
        set -- "$@" $EXTRA_ARGS
        set +f

        rsync -az \
          -e "ssh -i ${_SSH_KEY_FILE} -p ${PORT} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
          "$@" \
          "$SRC" "$DEST"

        echo "[rsync-deploy] synced ${SRC} -> ${DEST}"
