# Generic webhook notification job template (JSON POST)
# Reference from a job step via uses: (git://<host>/<owner>/<repo>/templates/notify-webhook.yaml@<ref>).
#
# Required secrets (if using url_secret):
#   unified-cd secret set my-webhook-url https://example.com/hooks/xxxx
#   * No secret is needed if passing the plaintext URL via the url parameter
#
# When referencing as a git:// template:
#   job: git://github.com/your-org/ci-templates/notify-webhook.yaml@v1
apiVersion: unified-cd/v1
kind: JobTemplate
metadata:
  name: notify-webhook
spec:
  params:
    inputs:
      - name: url_secret
        type: string
        default: ""
        description: "Name of the secret holding the destination POST URL. Mutually exclusive with url (exactly one is required)"
      - name: url
        type: string
        default: ""
        description: "Destination POST URL (plaintext). Mutually exclusive with url_secret (exactly one is required)"
      - name: payload
        type: string
        required: true
        description: "JSON string to send (raw data)"
      - name: content_type
        type: string
        default: "application/json"
        description: "Content-Type header"
      - name: retries
        type: string
        default: "3"
        description: "Number of curl --retry attempts"
  steps:
    - name: send
      env:
        URL_PLAIN: "{{ .Params.url }}"
        URL_FROM_SECRET: "{{ if .Params.url_secret }}{{ index .Secrets .Params.url_secret }}{{ end }}"
        PAYLOAD: "{{ .Params.payload }}"
        CONTENT_TYPE: "{{ .Params.content_type }}"
        RETRIES: "{{ .Params.retries }}"
      run: |
        #!/usr/bin/env sh
        set -eu

        if [ -n "$URL_FROM_SECRET" ]; then
          TARGET_URL="$URL_FROM_SECRET"
        else
          TARGET_URL="$URL_PLAIN"
        fi

        if [ -z "$TARGET_URL" ]; then
          echo "[notify-webhook] ERROR: either url_secret or url must be set" >&2
          exit 1
        fi

        curl -sS -f \
          --retry "$RETRIES" \
          -X POST \
          -H "Content-Type: ${CONTENT_TYPE}" \
          --data "$PAYLOAD" \
          "$TARGET_URL"
        echo "[notify-webhook] posted payload to webhook"
