# SMTP email notification job template (using curl's smtp(s):// support)
# Reference from a job step via uses: (git://<host>/<owner>/<repo>/templates/notify-email.yaml@<ref>).
#
# Required secrets:
#   unified-cd secret set smtp-url smtps://smtp.example.com:465
#   unified-cd secret set smtp-username user@example.com
#   unified-cd secret set smtp-password xxxxxxxx
#
# When referencing as a git:// template:
#   job: git://github.com/your-org/ci-templates/notify-email.yaml@v1
apiVersion: unified-cd/v1
kind: JobTemplate
metadata:
  name: notify-email
spec:
  params:
    inputs:
      - name: smtp_url_secret
        type: string
        required: true
        description: "Name of the secret holding the SMTP server URL (e.g. smtps://smtp.example.com:465)"
      - name: username_secret
        type: string
        required: true
        description: "Name of the secret holding the SMTP auth username"
      - name: password_secret
        type: string
        required: true
        description: "Name of the secret holding the SMTP auth password"
      - name: mail_from
        type: string
        required: true
        description: "Sender address"
      - name: mail_to
        type: string
        required: true
        description: "Recipient address(es) (comma-separated for multiple)"
      - name: subject
        type: string
        required: true
        description: "Subject"
      - name: body
        type: string
        required: true
        description: "Body (plain text)"
  steps:
    - name: send
      env:
        SMTP_URL: "{{ index .Secrets .Params.smtp_url_secret }}"
        SMTP_USERNAME: "{{ index .Secrets .Params.username_secret }}"
        SMTP_PASSWORD: "{{ index .Secrets .Params.password_secret }}"
        MAIL_FROM: "{{ .Params.mail_from }}"
        MAIL_TO: "{{ .Params.mail_to }}"
        SUBJECT: "{{ .Params.subject }}"
        BODY: "{{ .Params.body }}"
      run: |
        #!/usr/bin/env sh
        set -eu

        _MSG_FILE="$(mktemp)"
        chmod 600 "$_MSG_FILE"
        _cleanup() {
          rm -f "$_MSG_FILE"
        }
        trap _cleanup EXIT

        # Header injection prevention: verify that values used in RFC822
        # headers do not contain CR/LF (allowing newlines would make it
        # possible to inject additional headers)
        _check_no_crlf() {
          _name="$1"
          _val="$2"
          case "$_val" in
            *"$(printf '\r')"*)
              echo "[notify-email] ${_name} contains CR" >&2
              exit 1
              ;;
          esac
          if [ "$(printf '%s' "$_val" | wc -l)" -ne 0 ]; then
            echo "[notify-email] ${_name} contains LF" >&2
            exit 1
          fi
        }
        _check_no_crlf mail_from "$MAIL_FROM"
        _check_no_crlf mail_to "$MAIL_TO"
        _check_no_crlf subject "$SUBJECT"

        # Convert the comma-separated list into multiple --mail-rcpt options for RCPT
        set --
        _OLD_IFS="$IFS"
        IFS=','
        for _addr in $MAIL_TO; do
          [ -z "$_addr" ] && continue
          set -- "$@" --mail-rcpt "$_addr"
        done
        IFS="$_OLD_IFS"

        {
          printf 'From: %s\n' "$MAIL_FROM"
          printf 'To: %s\n' "$MAIL_TO"
          printf 'Subject: %s\n' "$SUBJECT"
          printf 'Content-Type: text/plain; charset=UTF-8\n'
          printf '\n'
          printf '%s\n' "$BODY"
        } > "$_MSG_FILE"

        curl -sS \
          --url "$SMTP_URL" \
          --mail-from "$MAIL_FROM" \
          "$@" \
          --user "${SMTP_USERNAME}:${SMTP_PASSWORD}" \
          --upload-file "$_MSG_FILE" \
          --ssl-reqd

        echo "[notify-email] sent mail to ${MAIL_TO}"
