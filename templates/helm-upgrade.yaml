# Helm upgrade --install job template
# Reference from a job step via uses: (git://<host>/<owner>/<repo>/templates/helm-upgrade.yaml@<ref>).
#
# Agent requirements: helm, kubectl
#
# Required secrets:
#   unified-cd secret set my-cluster-kubeconfig "$(cat ~/.kube/config)"
#
# When referencing as a git:// template:
#   job: git://github.com/your-org/ci-templates/helm-upgrade.yaml@v1
apiVersion: unified-cd/v1
kind: JobTemplate
metadata:
  name: helm-upgrade
spec:
  params:
    inputs:
      - name: release
        type: string
        required: true
        description: "Helm release name"
      - name: chart
        type: string
        required: true
        description: "Chart path or reference (e.g. ./charts/myapp, oci://..., repo/chart)"
      - name: namespace
        type: string
        required: true
        description: "Target deployment namespace"
      - name: values_file
        type: string
        default: ""
        description: "Path to the values file passed via -f (optional)"
      - name: set_values
        type: array
        default: ""
        description: "List of values passed as --set KEY=VALUE (YAML array, optional)"
      - name: kubeconfig_secret
        type: string
        required: true
        description: "Name of the secret holding the kubeconfig contents"
      - name: atomic
        type: string
        default: "true"
        description: "Whether to automatically roll back on failure (--atomic)"
      - name: timeout
        type: string
        default: "5m"
        description: "helm upgrade --timeout"
  steps:
    - name: helm-upgrade-install
      env:
        KUBECONFIG_CONTENT: "{{ index .Secrets .Params.kubeconfig_secret }}"
        RELEASE: "{{ .Params.release }}"
        CHART: "{{ .Params.chart }}"
        NAMESPACE: "{{ .Params.namespace }}"
        VALUES_FILE: "{{ .Params.values_file }}"
        SET_VALUES: "{{ .Params.set_values }}"
        ATOMIC: "{{ .Params.atomic }}"
        TIMEOUT: "{{ .Params.timeout }}"
      run: |
        #!/usr/bin/env sh
        set -eu

        _KUBECONFIG_FILE="$(mktemp)"
        chmod 600 "$_KUBECONFIG_FILE"
        _cleanup() {
          rm -f "$_KUBECONFIG_FILE"
        }
        trap _cleanup EXIT

        printf '%s\n' "$KUBECONFIG_CONTENT" > "$_KUBECONFIG_FILE"
        export KUBECONFIG="$_KUBECONFIG_FILE"

        set -- upgrade --install "$RELEASE" "$CHART" --namespace "$NAMESPACE" --create-namespace --timeout "$TIMEOUT"

        if [ "$ATOMIC" = "true" ]; then
          set -- "$@" --atomic
        fi

        if [ -n "$VALUES_FILE" ]; then
          set -- "$@" -f "$VALUES_FILE"
        fi

        _OLD_IFS="$IFS"
        IFS='
        '
        for _sv in $SET_VALUES; do
          [ -z "$_sv" ] && continue
          set -- "$@" --set "$_sv"
        done
        IFS="$_OLD_IFS"

        helm "$@"

        echo "[helm-upgrade] upgraded release ${RELEASE} in namespace ${NAMESPACE}"
