# Go module/build cache setup job template
# After registering with unified-cd apply -f templates/setup-go.yaml, invoke it via call.job
#
# Agent requirements: go (the go command must be on PATH)
#
# Note: `go env -w` persists settings into the current user environment
# ($HOME/.config/go/env). That only carries over to subsequent jobs on a
# `native: true` job — a native job's $HOME is the agent host's own user
# environment, shared across runs. In an isolated job (the default), the
# primary container's $HOME is fresh per run; only the per-job workspace
# directory persists across runs of the same job, which is why the cache
# steps below key off `working_dir` rather than relying on `go env -w`
# to survive between runs.
#
# cache: since a cache step can only specify a single path, this is split
# into two cache steps, one for GOMODCACHE and one for GOCACHE.
# Because path expands template expressions, it can point directly at the
# cache directories under working_dir (created by configure-go-env).
#
# When referencing as a git:// template:
#   job: git://github.com/your-org/ci-templates/setup-go.yaml@v1
apiVersion: unified-cd/v1
kind: Job
metadata:
  name: setup-go
spec:
  params:
    inputs:
      - name: working_dir
        type: string
        default: "."
        description: "Directory to look for go.sum in (default: current directory)"
        # working_dir must be relative to the run workspace; absolute paths are rejected.
  steps:
    - name: configure-go-env
      env:
        WORKING_DIR: "{{ .Params.working_dir }}"
      run: |
        #!/usr/bin/env sh
        set -eu
        cd "$WORKING_DIR"
        go env -w GOMODCACHE="$(pwd)/.gomodcache" GOCACHE="$(pwd)/.gocache"
        mkdir -p "$(pwd)/.gomodcache" "$(pwd)/.gocache"
        echo "[setup-go] GOMODCACHE=$(go env GOMODCACHE) GOCACHE=$(go env GOCACHE)"

    - name: restore-mod-cache
      cache:
        path: "{{ .Params.working_dir }}/.gomodcache"
        key: "go-mod-{{ hashFile \"go.sum\" }}"
        restoreKeys:
          - "go-mod-"

    - name: restore-build-cache
      cache:
        path: "{{ .Params.working_dir }}/.gocache"
        key: "go-build-{{ hashFile \"go.sum\" }}"
        restoreKeys:
          - "go-build-"
