# Node.js dependency cache setup job template
# After registering with unified-cd apply -f templates/setup-node.yaml, invoke it via call.job
#
# Agent requirements: node, npm
#
# cache: since the step's path expands template expressions ({{ .Params.* }}),
# node_modules under working_dir can be targeted directly for caching.
#
# When referencing as a git:// template:
#   job: git://github.com/your-org/ci-templates/setup-node.yaml@v1
apiVersion: unified-cd/v1
kind: Job
metadata:
  name: setup-node
spec:
  params:
    inputs:
      - name: working_dir
        type: string
        default: "."
        description: "Directory to run package-lock.json / npm ci in"
      - name: lockfile
        type: string
        default: "package-lock.json"
        description: "Name of the lockfile used to compute the cache key"
  steps:
    - name: restore-node-modules-cache
      cache:
        path: "{{ .Params.working_dir }}/node_modules"
        key: "npm-{{ hashFile .Params.lockfile }}"
        restoreKeys:
          - "npm-"

    - name: npm-ci
      env:
        WORKING_DIR: "{{ .Params.working_dir }}"
      run: |
        #!/usr/bin/env sh
        set -eu
        cd "$WORKING_DIR"
        npm ci
        echo "[setup-node] npm ci complete in ${WORKING_DIR}"
