# GitLab commit status update job template
# After registering with unified-cd apply -f templates/gitlab-commit-status.yaml, invoke it via call.job
#
# Required secrets:
#   unified-cd secret set gitlab-token glpat-xxxx
#   Required scope: api (or a role of report-manager or higher)
#
# When referencing as a git:// template:
#   job: git://github.com/your-org/ci-templates/gitlab-commit-status.yaml@v1
apiVersion: unified-cd/v1
kind: Job
metadata:
  name: gitlab-commit-status
spec:
  params:
    inputs:
      - name: base_url
        type: string
        default: "https://gitlab.com"
        description: "Base URL of the GitLab instance (change for self-managed)"
      - name: project
        type: string
        required: true
        description: "Project path (URL-encoded, e.g. group%2Fsubgroup%2Frepo) or numeric ID"
      - name: sha
        type: string
        required: true
        description: "Commit SHA"
      - name: state
        type: string
        required: true
        description: "pending / running / success / failed / canceled"
      - name: context
        type: string
        default: "unified-cd"
        description: "Status name (GitLab's name parameter)"
      - name: target_url
        type: string
        default: ""
        description: "Details link URL (optional)"
      - name: token_secret
        type: string
        default: "gitlab-token"
        description: "Name of the secret holding the GitLab token"
  steps:
    - name: update-status
      env:
        GITLAB_TOKEN: "{{ index .Secrets .Params.token_secret }}"
        BASE_URL: "{{ .Params.base_url }}"
        PROJECT: "{{ .Params.project }}"
        SHA: "{{ .Params.sha }}"
        STATE: "{{ .Params.state }}"
        CONTEXT: "{{ .Params.context }}"
        TARGET_URL: "{{ .Params.target_url }}"
      run: |
        #!/usr/bin/env sh
        set -eu

        _RESPONSE_FILE="$(mktemp)"
        _cleanup() {
          rm -f "$_RESPONSE_FILE"
        }
        trap _cleanup EXIT

        # URL-encode each value before embedding it in the query string
        _urlencode() {
          _s="$1"
          _len=${#_s}
          _i=0
          while [ "$_i" -lt "$_len" ]; do
            _c="$(printf '%s' "$_s" | cut -c $((_i + 1)))"
            case "$_c" in
              [a-zA-Z0-9.~_-])
                printf '%s' "$_c"
                ;;
              *)
                printf '%%%02X' "'$_c"
                ;;
            esac
            _i=$((_i + 1))
          done
        }

        _STATE_ENC="$(_urlencode "$STATE")"
        _CONTEXT_ENC="$(_urlencode "$CONTEXT")"

        _URL="${BASE_URL}/api/v4/projects/${PROJECT}/statuses/${SHA}?state=${_STATE_ENC}&name=${_CONTEXT_ENC}"
        if [ -n "$TARGET_URL" ]; then
          _TARGET_URL_ENC="$(_urlencode "$TARGET_URL")"
          _URL="${_URL}&target_url=${_TARGET_URL_ENC}"
        fi

        HTTP_STATUS=$(curl -s -o "$_RESPONSE_FILE" -w "%{http_code}" \
          -X POST \
          -H "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
          "$_URL")

        # GitLab may return either 201 for new creation or 200 for updating an existing status
        if [ "$HTTP_STATUS" != "201" ] && [ "$HTTP_STATUS" != "200" ]; then
          echo "[gitlab-commit-status] GitLab API returned HTTP ${HTTP_STATUS}" >&2
          cat "$_RESPONSE_FILE" >&2 2>/dev/null || true
          exit 1
        fi
        echo "[gitlab-commit-status] set status ${STATE} for ${SHA}"
