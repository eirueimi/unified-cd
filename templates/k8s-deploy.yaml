# Kubernetes manifest apply job template
# Reference from a job step via uses: (git://<host>/<owner>/<repo>/templates/k8s-deploy.yaml@<ref>).
#
# Agent requirements: kubectl
#
# Required secrets:
#   unified-cd secret set my-cluster-kubeconfig "$(cat ~/.kube/config)"
#
# When referencing as a git:// template:
#   job: git://github.com/your-org/ci-templates/k8s-deploy.yaml@v1
apiVersion: unified-cd/v1
kind: JobTemplate
metadata:
  name: k8s-deploy
spec:
  params:
    inputs:
      - name: manifest_path
        type: string
        required: true
        description: "Path to the manifest file/directory to apply (passed to kubectl apply -f)"
      - name: namespace
        type: string
        default: "default"
        description: "Target namespace to apply to"
      - name: kubeconfig_secret
        type: string
        required: true
        description: "Name of the secret holding the kubeconfig contents"
      - name: rollout_target
        type: string
        default: ""
        description: "Target to wait for rollout completion (e.g. deployment/myapp). If empty, skips waiting for rollout"
      - name: timeout
        type: string
        default: "120s"
        description: "Timeout for kubectl rollout status"
  steps:
    - name: apply-manifests
      env:
        KUBECONFIG_CONTENT: "{{ index .Secrets .Params.kubeconfig_secret }}"
        MANIFEST_PATH: "{{ .Params.manifest_path }}"
        NAMESPACE: "{{ .Params.namespace }}"
        ROLLOUT_TARGET: "{{ .Params.rollout_target }}"
        TIMEOUT: "{{ .Params.timeout }}"
      run: |
        #!/usr/bin/env sh
        set -eu

        _KUBECONFIG_FILE="$(mktemp)"
        chmod 600 "$_KUBECONFIG_FILE"
        _cleanup() {
          rm -f "$_KUBECONFIG_FILE"
        }
        trap _cleanup EXIT

        printf '%s\n' "$KUBECONFIG_CONTENT" > "$_KUBECONFIG_FILE"
        export KUBECONFIG="$_KUBECONFIG_FILE"

        kubectl apply -n "$NAMESPACE" -f "$MANIFEST_PATH"

        if [ -n "$ROLLOUT_TARGET" ]; then
          echo "[k8s-deploy] waiting for rollout of ${ROLLOUT_TARGET} (timeout ${TIMEOUT})"
          kubectl rollout status "$ROLLOUT_TARGET" -n "$NAMESPACE" --timeout="$TIMEOUT"
        fi

        echo "[k8s-deploy] applied ${MANIFEST_PATH} to namespace ${NAMESPACE}"
