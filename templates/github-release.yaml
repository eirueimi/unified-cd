# GitHub リリース作成 & アセットアップロード ジョブテンプレート（curl のみ、gh 不要）
# unified-cd apply examples/github-release.yaml で登録後、call.job で呼び出す
#
# 必要なシークレット:
#   unified-cd secret set github-token --value ghp_xxxx
#   必要な権限: contents:write
#
# git:// テンプレートとして参照する場合:
#   job: git://github.com/your-org/ci-templates/github-release.yaml@v1
apiVersion: unified-cd/v1
kind: Job
metadata:
  name: github-release
spec:
  params:
    inputs:
      - name: repo
        type: string
        required: true
        description: "org/name 形式のリポジトリ"
      - name: tag
        type: string
        required: true
        description: "リリースタグ名（既存タグでも新規タグでも可）"
      - name: title
        type: string
        default: ""
        description: "リリースタイトル（省略時は tag と同じ）"
      - name: notes
        type: string
        default: ""
        description: "リリースノート本文（Markdown）"
      - name: assets
        type: array
        default: ""
        description: "アップロードするファイルパス一覧（YAML 配列、省略可）"
      - name: draft
        type: string
        default: "false"
        description: "ドラフトとして作成するか（true/false）"
      - name: prerelease
        type: string
        default: "false"
        description: "プレリリースとして作成するか（true/false）"
      - name: token_secret
        type: string
        default: "github-token"
        description: "GitHub トークンを保持するシークレット名"
      - name: api_url
        type: string
        default: "https://api.github.com"
        description: "GitHub API のベース URL（GitHub Enterprise Server の場合に変更）"
      - name: upload_url
        type: string
        default: "https://uploads.github.com"
        description: "アセットアップロード用のベース URL（GitHub Enterprise Server の場合に変更）"
  steps:
    - name: create-release-and-upload-assets
      env:
        GITHUB_TOKEN: "{{ index .Secrets .Params.token_secret }}"
        REPO: "{{ .Params.repo }}"
        TAG: "{{ .Params.tag }}"
        TITLE: "{{ .Params.title }}"
        NOTES: "{{ .Params.notes }}"
        ASSETS: "{{ .Params.assets }}"
        DRAFT: "{{ .Params.draft }}"
        PRERELEASE: "{{ .Params.prerelease }}"
        API_URL: "{{ .Params.api_url }}"
        UPLOAD_URL: "{{ .Params.upload_url }}"
      run: |
        #!/usr/bin/env sh
        set -eu

        _PAYLOAD_FILE="$(mktemp)"
        _RESPONSE_FILE="$(mktemp)"
        _cleanup() {
          rm -f "$_PAYLOAD_FILE" "$_RESPONSE_FILE"
        }
        trap _cleanup EXIT

        _json_escape() {
          printf '%s' "$1" | sed -e 's/\\/\\\\/g' -e 's/"/\\"/g' -e ':a' -e 'N' -e '$!ba' -e 's/\n/\\n/g'
        }

        # draft/prerelease は JSON の真偽値リテラルとしてそのまま埋め込むため、
        # true/false のいずれかであることを厳密に検証してから使用する
        case "$DRAFT" in
          true|false) ;;
          *)
            echo "[github-release] invalid draft value: ${DRAFT}" >&2
            exit 1
            ;;
        esac
        case "$PRERELEASE" in
          true|false) ;;
          *)
            echo "[github-release] invalid prerelease value: ${PRERELEASE}" >&2
            exit 1
            ;;
        esac

        _TITLE="$TITLE"
        if [ -z "$_TITLE" ]; then
          _TITLE="$TAG"
        fi

        _ESCAPED_TITLE="$(_json_escape "$_TITLE")"
        _ESCAPED_NOTES="$(_json_escape "$NOTES")"
        _ESCAPED_TAG="$(_json_escape "$TAG")"

        printf '{"tag_name":"%s","name":"%s","body":"%s","draft":%s,"prerelease":%s}' \
          "${_ESCAPED_TAG}" "${_ESCAPED_TITLE}" "${_ESCAPED_NOTES}" "${DRAFT}" "${PRERELEASE}" \
          > "$_PAYLOAD_FILE"

        HTTP_STATUS=$(curl -s -o "$_RESPONSE_FILE" -w "%{http_code}" \
          -X POST \
          -H "Authorization: Bearer ${GITHUB_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          -H "Content-Type: application/json" \
          "${API_URL}/repos/${REPO}/releases" \
          --data @"$_PAYLOAD_FILE")

        if [ "$HTTP_STATUS" != "201" ]; then
          echo "[github-release] create release returned HTTP ${HTTP_STATUS}" >&2
          cat "$_RESPONSE_FILE" >&2
          exit 1
        fi

        _RELEASE_ID="$(sed -n 's/.*"id": *\([0-9]*\).*/\1/p' "$_RESPONSE_FILE" | head -n1)"
        if [ -z "$_RELEASE_ID" ]; then
          echo "[github-release] ERROR: could not parse release id from response" >&2
          cat "$_RESPONSE_FILE" >&2
          exit 1
        fi
        echo "[github-release] created release ${TAG} (id=${_RELEASE_ID})"

        # name= クエリパラメータに埋め込む前にアセット名を URL エンコードする
        _urlencode() {
          _s="$1"
          _len=${#_s}
          _i=0
          while [ "$_i" -lt "$_len" ]; do
            _c="$(printf '%s' "$_s" | cut -c $((_i + 1)))"
            case "$_c" in
              [a-zA-Z0-9.~_-])
                printf '%s' "$_c"
                ;;
              *)
                printf '%%%02X' "'$_c"
                ;;
            esac
            _i=$((_i + 1))
          done
        }

        # アセットが指定されていればアップロード（配列パラメータは改行区切りで渡される）
        if [ -n "$ASSETS" ]; then
          _OLD_IFS="$IFS"
          IFS='
        '
          for _asset in $ASSETS; do
            [ -z "$_asset" ] && continue
            if [ ! -f "$_asset" ]; then
              echo "[github-release] ERROR: asset not found: ${_asset}" >&2
              exit 1
            fi
            _asset_name="$(basename "$_asset")"
            _asset_name_enc="$(_urlencode "$_asset_name")"
            echo "[github-release] uploading asset: ${_asset_name}"
            _UP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${_asset}" \
              "${UPLOAD_URL}/repos/${REPO}/releases/${_RELEASE_ID}/assets?name=${_asset_name_enc}")
            if [ "$_UP_STATUS" != "201" ]; then
              echo "[github-release] ERROR: asset upload for ${_asset_name} returned HTTP ${_UP_STATUS}" >&2
              exit 1
            fi
          done
          IFS="$_OLD_IFS"
        fi

        echo "[github-release] done"
