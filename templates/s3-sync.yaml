# Object storage sync job template via AWS CLI (aws s3 sync)
# After registering with unified-cd apply examples/s3-sync.yaml, invoke it via call.job
#
# Agent requirements: aws (AWS CLI v2)
#
# Required secrets:
#   unified-cd secret set s3-access-key --value AKIAxxxxxxxx
#   unified-cd secret set s3-secret-key --value xxxxxxxxxxxx
#
# When using an S3-compatible storage such as MinIO / Garage, set endpoint
# to a custom endpoint such as https://minio.example.com.
#
# When referencing as a git:// template:
#   job: git://github.com/your-org/ci-templates/s3-sync.yaml@v1
apiVersion: unified-cd/v1
kind: Job
metadata:
  name: s3-sync
spec:
  params:
    inputs:
      - name: src
        type: string
        required: true
        description: "Sync source path (local directory or s3://bucket/path)"
      - name: dest
        type: string
        required: true
        description: "Sync destination path (s3://bucket/path; can also be used for downloads in the reverse direction from src)"
      - name: endpoint
        type: string
        default: ""
        description: "S3-compatible endpoint URL (if empty, uses the standard AWS endpoint)"
      - name: access_key_secret
        type: string
        required: true
        description: "Name of the secret holding the access key"
      - name: secret_key_secret
        type: string
        required: true
        description: "Name of the secret holding the secret key"
      - name: region
        type: string
        default: "us-east-1"
        description: "Region"
      - name: delete
        type: string
        default: "false"
        description: "Whether to delete objects from the destination that no longer exist at the source (aws s3 sync --delete)"
      - name: acl
        type: string
        default: ""
        description: "ACL to use on upload (e.g. public-read. optional)"
  steps:
    - name: s3-sync
      env:
        AWS_ACCESS_KEY_ID: "{{ index .Secrets .Params.access_key_secret }}"
        AWS_SECRET_ACCESS_KEY: "{{ index .Secrets .Params.secret_key_secret }}"
        SRC: "{{ .Params.src }}"
        DEST: "{{ .Params.dest }}"
        ENDPOINT: "{{ .Params.endpoint }}"
        AWS_DEFAULT_REGION: "{{ .Params.region }}"
        DELETE: "{{ .Params.delete }}"
        ACL: "{{ .Params.acl }}"
      run: |
        #!/usr/bin/env sh
        set -eu

        set -- s3 sync "$SRC" "$DEST"

        if [ -n "$ENDPOINT" ]; then
          set -- "$@" --endpoint-url "$ENDPOINT"
        fi
        if [ "$DELETE" = "true" ]; then
          set -- "$@" --delete
        fi
        if [ -n "$ACL" ]; then
          set -- "$@" --acl "$ACL"
        fi

        aws "$@"

        echo "[s3-sync] synced ${SRC} -> ${DEST}"
