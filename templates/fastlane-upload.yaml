# fastlane lane execution job template (supports App Store Connect API key)
# Register with unified-cd apply examples/fastlane-upload.yaml, then invoke via call.job
#
# [Note — this cannot be run in this repository's CI]
# This only works on a macOS agent with fastlane / bundler / Xcode installed
# (recommend labeling it with macos:true, fastlane:true, or similar in
# agentSelector). The following is based on the official fastlane
# documentation and has not been verified by actual execution:
#   - The ASC_KEY_ID / ASC_ISSUER_ID / ASC_KEY_CONTENT environment variable
#     names match the convention referenced by fastlane's App Store Connect
#     API key authentication (the app_store_connect_api_key action). The
#     actual variable names/passing method may differ depending on the
#     fastlane plugin or version in use, so please do a final check against
#     the fastlane documentation when adopting this.
#   - If a Gemfile is present, falls back to `bundle exec fastlane`;
#     otherwise falls back to the plain `fastlane` command.
#
# Required secrets (when using App Store Connect API key authentication; optional):
#   unified-cd secret set asc-key-id XXXXXXXXXX
#   unified-cd secret set asc-issuer-id xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
#   unified-cd secret set asc-key-content "$(cat AuthKey_XXXXXXXXXX.p8)"
#
# When referencing as a git:// template:
#   job: git://github.com/your-org/ci-templates/fastlane-upload.yaml@v1
apiVersion: unified-cd/v1
kind: Job
metadata:
  name: fastlane-upload
spec:
  params:
    inputs:
      - name: lane
        type: string
        required: true
        description: "Name of the fastlane lane to run"
      - name: project_dir
        type: string
        default: "."
        description: "Directory containing the Fastfile (the parent directory of fastlane/)"
      - name: asc_key_id_secret
        type: string
        default: ""
        description: "Secret name holding the App Store Connect API Key ID (optional)"
      - name: asc_issuer_id_secret
        type: string
        default: ""
        description: "Secret name holding the App Store Connect Issuer ID (optional)"
      - name: asc_key_content_secret
        type: string
        default: ""
        description: "Secret name holding the App Store Connect API key (.p8 contents) (optional)"
  steps:
    - name: run-fastlane
      env:
        LANE: "{{ .Params.lane }}"
        PROJECT_DIR: "{{ .Params.project_dir }}"
        ASC_KEY_ID: "{{ if .Params.asc_key_id_secret }}{{ index .Secrets .Params.asc_key_id_secret }}{{ end }}"
        ASC_ISSUER_ID: "{{ if .Params.asc_issuer_id_secret }}{{ index .Secrets .Params.asc_issuer_id_secret }}{{ end }}"
        ASC_KEY_CONTENT: "{{ if .Params.asc_key_content_secret }}{{ index .Secrets .Params.asc_key_content_secret }}{{ end }}"
      run: |
        #!/usr/bin/env sh
        set -eu

        export ASC_KEY_ID ASC_ISSUER_ID ASC_KEY_CONTENT

        cd "$PROJECT_DIR"

        if [ -f "Gemfile" ]; then
          echo "[fastlane-upload] Gemfile found; running via bundle exec"
          bundle exec fastlane "$LANE"
        else
          echo "[fastlane-upload] no Gemfile found; running plain fastlane"
          fastlane "$LANE"
        fi

        echo "[fastlane-upload] lane ${LANE} completed"
