# GitHub Commit Status update job template
# After registering with unified-cd apply examples/github-commit-status.yaml, invoke it via call.job
#
# Required secrets:
#   unified-cd secret set github-token ghp_xxxx
#   Required permission: repo:status
#
# When referencing as a git:// template:
#   job: git://github.com/your-org/ci-templates/github-commit-status.yaml@v1
apiVersion: unified-cd/v1
kind: Job
metadata:
  name: github-commit-status
spec:
  params:
    inputs:
      - name: owner
        type: string
        required: true
        description: "GitHub owner name (org or user)"
      - name: repo
        type: string
        required: true
        description: "Repository name"
      - name: sha
        type: string
        required: true
        description: "40-character commit SHA"
      - name: state
        type: string
        required: true
        description: "pending / success / failure / error"
      - name: context
        type: string
        default: "unified-cd"
        description: "Label displayed in the PR's Checks section"
      - name: description
        type: string
        default: ""
        description: "Status description text (optional)"
      - name: target_url
        type: string
        default: ""
        description: "Details link URL (e.g. the run's detail page URL)"
  steps:
    - name: update-status
      env:
        GITHUB_TOKEN: "{{ .Secrets.github-token }}"
        OWNER: "{{ .Params.owner }}"
        REPO: "{{ .Params.repo }}"
        SHA: "{{ .Params.sha }}"
        STATE: "{{ .Params.state }}"
        CONTEXT: "{{ .Params.context }}"
        DESCRIPTION: "{{ .Params.description }}"
        TARGET_URL: "{{ .Params.target_url }}"
      run: |
        BODY="{\"state\":\"${STATE}\",\"context\":\"${CONTEXT}\",\"description\":\"${DESCRIPTION}\",\"target_url\":\"${TARGET_URL}\"}"

        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          -X POST \
          -H "Authorization: Bearer ${GITHUB_TOKEN}" \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Content-Type: application/json" \
          "https://api.github.com/repos/${OWNER}/${REPO}/statuses/${SHA}" \
          -d "$BODY")

        if [ "$HTTP_STATUS" != "201" ]; then
          echo "GitHub API returned HTTP ${HTTP_STATUS}" >&2
          exit 1
        fi
        echo "Commit status updated: ${STATE}"
