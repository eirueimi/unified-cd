# Unity batch-mode build job template
# Reference from a job step via uses: (git://<host>/<owner>/<repo>/templates/unity-build.yaml@<ref>).
#
# [Note — this cannot be run in this repository's CI]
# This template only works on a physical/VM agent that has Unity Editor
# installed (recommend labeling it with unity:true or similar in
# agentSelector). Since it can't be directly verified with curl or go test
# during development, the following assumptions are made. Please run a
# smoke test on an actual operational agent before use:
#   - The path given in unity_path is the Unity Editor executable
#     (Windows: Unity.exe; macOS/Linux: the Unity binary)
#   - build_method is a static C# method passed to `-executeMethod`
#     (e.g. BuildScript.Build) and is implemented in the project
#   - License activation is assumed to already be done on the operational agent
#     (if license_*_secret is provided, activation is attempted each time via
#     `-serial`/`-username`/`-password`, but since this depends on Unity's
#     license server connectivity and activation limits, it could not be
#     verified in CI. Reference: in the unity-messaging-cd-workflow setup,
#     the agent is configured with a permanent license and this argument
#     is left unused)
#   - Logs are streamed to stdout via -logFile -, and success/failure is
#     determined from Unity's exit code (this relies on the documented
#     behavior that Unity exits non-zero on build failure; the exit code
#     has not been verified on real hardware)
#
# When referencing as a git:// template:
#   job: git://github.com/your-org/ci-templates/unity-build.yaml@v1
apiVersion: unified-cd/v1
kind: JobTemplate
metadata:
  name: unity-build
spec:
  params:
    inputs:
      - name: unity_path
        type: string
        default: "unity"
        description: "Path to the Unity Editor executable (leave as 'unity' if it's on PATH)"
      - name: project_path
        type: string
        default: "."
        description: "Root directory of the Unity project"
      - name: build_target
        type: string
        required: true
        description: "Build target (e.g. Android, iOS, WebGL, StandaloneLinux64)"
      - name: build_method
        type: string
        default: "BuildScript.Build"
        description: "Static C# method passed to -executeMethod"
      - name: output_path
        type: string
        required: true
        description: "Output path for the build artifact"
      - name: license_serial_secret
        type: string
        default: ""
        description: "Secret name holding the Unity license serial (optional; not needed on an agent that's already activated)"
      - name: license_username_secret
        type: string
        default: ""
        description: "Secret name holding the username for Unity license authentication (optional)"
      - name: license_password_secret
        type: string
        default: ""
        description: "Secret name holding the password for Unity license authentication (optional)"
      - name: extra_args
        type: string
        default: ""
        description: "Additional arguments to pass to Unity batch mode (space-separated, optional)"
  steps:
    - name: build
      env:
        UNITY_PATH: "{{ .Params.unity_path }}"
        PROJECT_PATH: "{{ .Params.project_path }}"
        BUILD_TARGET: "{{ .Params.build_target }}"
        BUILD_METHOD: "{{ .Params.build_method }}"
        OUTPUT_PATH: "{{ .Params.output_path }}"
        LICENSE_SERIAL: "{{ if .Params.license_serial_secret }}{{ index .Secrets .Params.license_serial_secret }}{{ end }}"
        LICENSE_USERNAME: "{{ if .Params.license_username_secret }}{{ index .Secrets .Params.license_username_secret }}{{ end }}"
        LICENSE_PASSWORD: "{{ if .Params.license_password_secret }}{{ index .Secrets .Params.license_password_secret }}{{ end }}"
        EXTRA_ARGS: "{{ .Params.extra_args }}"
      run: |
        #!/usr/bin/env sh
        set -eu

        set --
        if [ -n "$LICENSE_SERIAL" ]; then
          set -- "$@" -serial "$LICENSE_SERIAL"
        fi
        if [ -n "$LICENSE_USERNAME" ]; then
          set -- "$@" -username "$LICENSE_USERNAME"
        fi
        if [ -n "$LICENSE_PASSWORD" ]; then
          set -- "$@" -password "$LICENSE_PASSWORD"
        fi

        # extra_args is free-form, space-separated input and word splitting is allowed
        # by design, but glob expansion (*, ?, [ ...]) against workspace file names is
        # disabled to prevent flag injection via unintended filename expansion (set -f).
        set -f
        # shellcheck disable=SC2086
        set -- "$@" $EXTRA_ARGS
        set +f

        mkdir -p "$(dirname "$OUTPUT_PATH")" 2>/dev/null || true

        echo "[unity-build] building ${BUILD_TARGET} via ${BUILD_METHOD} -> ${OUTPUT_PATH}"

        _EXIT_CODE=0
        "$UNITY_PATH" \
          -batchmode \
          -nographics \
          -quit \
          -projectPath "$PROJECT_PATH" \
          -buildTarget "$BUILD_TARGET" \
          -executeMethod "$BUILD_METHOD" \
          -logFile - \
          "$@" \
          -customBuildOutputPath "$OUTPUT_PATH" || _EXIT_CODE=$?

        if [ "$_EXIT_CODE" -ne 0 ]; then
          echo "[unity-build] Unity exited with code ${_EXIT_CODE}" >&2
          exit "$_EXIT_CODE"
        fi

        echo "[unity-build] build complete: ${OUTPUT_PATH}"
