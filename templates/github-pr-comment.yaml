# GitHub PR comment posting job template
# Reference from a job step via uses: (git://<host>/<owner>/<repo>/templates/github-pr-comment.yaml@<ref>).
#
# Required secrets:
#   unified-cd secret set github-token ghp_xxxx
#   Required permission: pull-requests:write (the Issues comment API is also used for PRs)
#
# When referencing as a git:// template:
#   job: git://github.com/your-org/ci-templates/github-pr-comment.yaml@v1
apiVersion: unified-cd/v1
kind: JobTemplate
metadata:
  name: github-pr-comment
spec:
  params:
    inputs:
      - name: repo
        type: string
        required: true
        description: "Repository in org/name format"
      - name: pr_number
        type: string
        required: true
        description: "PR number (shared with the issue number)"
      - name: body
        type: string
        required: true
        description: "Comment body (GitHub Flavored Markdown)"
      - name: token_secret
        type: string
        default: "github-token"
        description: "Name of the secret holding the GitHub token"
      - name: api_url
        type: string
        default: "https://api.github.com"
        description: "GitHub API base URL (change for GitHub Enterprise Server)"
  steps:
    - name: comment
      env:
        GITHUB_TOKEN: "{{ index .Secrets .Params.token_secret }}"
        REPO: "{{ .Params.repo }}"
        PR_NUMBER: "{{ .Params.pr_number }}"
        BODY: "{{ .Params.body }}"
        API_URL: "{{ .Params.api_url }}"
      run: |
        #!/usr/bin/env sh
        set -eu

        _PAYLOAD_FILE="$(mktemp)"
        _RESPONSE_FILE="$(mktemp)"
        _cleanup() {
          rm -f "$_PAYLOAD_FILE" "$_RESPONSE_FILE"
        }
        trap _cleanup EXIT

        # Manually JSON-escape so this works without jq (only handles \, ", and newlines)
        _ESCAPED_BODY="$(printf '%s' "$BODY" | sed -e 's/\\/\\\\/g' -e 's/"/\\"/g' -e ':a' -e 'N' -e '$!ba' -e 's/\n/\\n/g')"
        printf '{"body":"%s"}' "$_ESCAPED_BODY" > "$_PAYLOAD_FILE"

        HTTP_STATUS=$(curl -s -o "$_RESPONSE_FILE" -w "%{http_code}" \
          -X POST \
          -H "Authorization: Bearer ${GITHUB_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          -H "Content-Type: application/json" \
          "${API_URL}/repos/${REPO}/issues/${PR_NUMBER}/comments" \
          --data @"$_PAYLOAD_FILE")

        if [ "$HTTP_STATUS" != "201" ]; then
          echo "[github-pr-comment] GitHub API returned HTTP ${HTTP_STATUS}" >&2
          cat "$_RESPONSE_FILE" >&2 2>/dev/null || true
          exit 1
        fi
        echo "[github-pr-comment] posted comment on ${REPO}#${PR_NUMBER}"
