# Docker image build & push job template
# Register with unified-cd apply -f templates/docker-build-push.yaml, then invoke via call.job
#
# Agent requirements: docker (buildx is also required for multi-platform builds)
#
# Required secrets (when pushing to a private registry / Docker Hub):
#   unified-cd secret set dockerhub-username myuser
#   unified-cd secret set dockerhub-password xxxxxxxx
#   * If username_secret is not set, push is attempted without authentication (e.g. for public anonymous pushes)
#
# When referencing as a git:// template:
#   job: git://github.com/your-org/ci-templates/docker-build-push.yaml@v1
apiVersion: unified-cd/v1
kind: Job
metadata:
  name: docker-build-push
spec:
  params:
    inputs:
      - name: image
        type: string
        required: true
        description: "Image name in registry/repo form (e.g. myorg/myapp)"
      - name: tags
        type: array
        default: "latest"
        description: "List of tags to apply (YAML array)"
      - name: context
        type: string
        default: "."
        description: "Path to the build context"
      - name: dockerfile
        type: string
        default: "Dockerfile"
        description: "Path to the Dockerfile (relative to context)"
      - name: registry
        type: string
        default: ""
        description: "Registry hostname (e.g. ghcr.io; empty means Docker Hub)"
      - name: username_secret
        type: string
        default: ""
        description: "Secret name holding the registry auth username (empty skips login)"
      - name: password_secret
        type: string
        default: ""
        description: "Secret name holding the registry auth password/token"
      - name: push
        type: string
        default: "true"
        description: "Whether to push after building (true/false)"
      - name: build_args
        type: array
        default: ""
        description: "List of KEY=VALUE pairs passed to docker build --build-arg (YAML array)"
      - name: platform
        type: string
        default: ""
        description: "Multi-platform build targets (e.g. linux/amd64,linux/arm64). Empty uses a regular docker build"
  steps:
    - name: build-and-push
      env:
        IMAGE: "{{ .Params.image }}"
        TAGS: "{{ .Params.tags }}"
        CONTEXT: "{{ .Params.context }}"
        DOCKERFILE: "{{ .Params.dockerfile }}"
        REGISTRY: "{{ .Params.registry }}"
        REGISTRY_USERNAME: "{{ if .Params.username_secret }}{{ index .Secrets .Params.username_secret }}{{ end }}"
        REGISTRY_PASSWORD: "{{ if .Params.password_secret }}{{ index .Secrets .Params.password_secret }}{{ end }}"
        DO_PUSH: "{{ .Params.push }}"
        BUILD_ARGS: "{{ .Params.build_args }}"
        PLATFORM: "{{ .Params.platform }}"
      run: |
        #!/usr/bin/env sh
        set -eu

        _cleanup() {
          if [ -n "$REGISTRY_USERNAME" ]; then
            docker logout "$REGISTRY" >/dev/null 2>&1 || true
          fi
        }
        trap _cleanup EXIT

        if [ -n "$REGISTRY_USERNAME" ]; then
          echo "[docker-build-push] logging in to ${REGISTRY:-docker.io}"
          printf '%s' "$REGISTRY_PASSWORD" | docker login "$REGISTRY" --username "$REGISTRY_USERNAME" --password-stdin
        fi

        _FULL_IMAGE="$IMAGE"
        if [ -n "$REGISTRY" ]; then
          _FULL_IMAGE="${REGISTRY}/${IMAGE}"
        fi

        # Convert the tag list into -t arguments (array params are passed newline-separated)
        set --
        _OLD_IFS="$IFS"
        IFS='
        '
        for _tag in $TAGS; do
          [ -z "$_tag" ] && continue
          set -- "$@" -t "${_FULL_IMAGE}:${_tag}"
        done
        IFS="$_OLD_IFS"

        if [ "$#" -eq 0 ]; then
          set -- -t "${_FULL_IMAGE}:latest"
        fi

        # Convert the build-arg list into --build-arg arguments
        _OLD_IFS="$IFS"
        IFS='
        '
        for _ba in $BUILD_ARGS; do
          [ -z "$_ba" ] && continue
          set -- "$@" --build-arg "$_ba"
        done
        IFS="$_OLD_IFS"

        if [ -n "$PLATFORM" ]; then
          if [ "$DO_PUSH" = "true" ]; then
            set -- "$@" --push
          fi
          echo "[docker-build-push] buildx build --platform ${PLATFORM}"
          docker buildx build \
            --platform "$PLATFORM" \
            -f "${CONTEXT}/${DOCKERFILE}" \
            "$@" \
            "$CONTEXT"
        else
          echo "[docker-build-push] docker build"
          docker build \
            -f "${CONTEXT}/${DOCKERFILE}" \
            "$@" \
            "$CONTEXT"

          if [ "$DO_PUSH" = "true" ]; then
            _OLD_IFS="$IFS"
            IFS='
        '
            for _tag in $TAGS; do
              [ -z "$_tag" ] && continue
              docker push "${_FULL_IMAGE}:${_tag}"
            done
            IFS="$_OLD_IFS"
            if [ -z "$TAGS" ]; then
              docker push "${_FULL_IMAGE}:latest"
            fi
          fi
        fi

        echo "[docker-build-push] done: ${_FULL_IMAGE}"
