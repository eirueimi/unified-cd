# Google Play AAB upload job template (via fastlane supply)
# Register with unified-cd apply -f templates/google-play-upload.yaml, then invoke via call.job
#
# [Prerequisites — this cannot be run in this repository's CI]
# This template only works on an agent that has fastlane (and the supply
# action, effectively a Ruby + bundler environment) installed (recommend
# labeling it with fastlane:true or similar in agentSelector). The following
# is based on the official fastlane documentation and has not been verified
# by actual execution:
#   - `fastlane supply` accepts service account JSON key authentication via
#     the `--json_key` argument (or the JSON_KEY_FILE environment variable)
#   - Assumes the service account has been granted "Release Manager" or
#     higher permissions on the Google Play Console side
#
# Required secrets:
#   unified-cd secret set google-play-service-account "$(cat service-account.json)"
#
# When referencing as a git:// template:
#   job: git://github.com/your-org/ci-templates/google-play-upload.yaml@v1
apiVersion: unified-cd/v1
kind: Job
metadata:
  name: google-play-upload
spec:
  params:
    inputs:
      - name: aab_path
        type: string
        required: true
        description: "Path to the .aab file to upload"
      - name: package_name
        type: string
        required: true
        description: "App package name (e.g. com.example.myapp)"
      - name: track
        type: string
        default: "internal"
        description: "Release track (internal / alpha / beta / production, etc.)"
      - name: service_account_json_secret
        type: string
        required: true
        description: "Secret name holding the Google Play service account JSON key"
  steps:
    - name: supply-upload
      env:
        SERVICE_ACCOUNT_JSON: "{{ index .Secrets .Params.service_account_json_secret }}"
        AAB_PATH: "{{ .Params.aab_path }}"
        PACKAGE_NAME: "{{ .Params.package_name }}"
        TRACK: "{{ .Params.track }}"
      run: |
        #!/usr/bin/env sh
        set -eu

        _KEY_FILE="$(mktemp)"
        chmod 600 "$_KEY_FILE"
        _cleanup() {
          rm -f "$_KEY_FILE"
        }
        trap _cleanup EXIT

        printf '%s\n' "$SERVICE_ACCOUNT_JSON" > "$_KEY_FILE"

        if [ ! -f "$AAB_PATH" ]; then
          echo "[google-play-upload] ERROR: aab not found at ${AAB_PATH}" >&2
          exit 1
        fi

        fastlane supply \
          --json_key "$_KEY_FILE" \
          --package_name "$PACKAGE_NAME" \
          --track "$TRACK" \
          --aab "$AAB_PATH"

        echo "[google-play-upload] uploaded ${AAB_PATH} to track ${TRACK} for ${PACKAGE_NAME}"
