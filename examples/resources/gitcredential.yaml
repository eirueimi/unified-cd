# GitCredential — per-host authentication for private Git repositories.
# Credentials are resolved automatically when a job accesses a git:// URI for the matching host.
#
# Usage:
#   unified-cd secret set github-token <personal-access-token>
#   unified-cd apply -f examples/resources/gitcredential.yaml
#   unified-cd run trigger private-template-job

# ── GitHub personal access token ─────────────────────────────────────────
apiVersion: unified-cd/v1
kind: GitCredential
metadata:
  name: github-org
spec:
  # credentials for this hostname are applied to any git:// access targeting it
  host: github.com
  type: token             # token: PAT / OAuth token | sshKey: SSH private key
  secretRef: github-token # name of a StoredSecret containing the credential value

---
# ── SSH key example (also works for GitLab, Gitea, etc.) ─────────────────
apiVersion: unified-cd/v1
kind: GitCredential
metadata:
  name: gitlab-internal
spec:
  host: gitlab.example.com
  type: sshKey
  secretRef: gitlab-ssh-key

---
# ── Job that uses the credentials above ──────────────────────────────────
# Credentials for github.com and gitlab.example.com are applied automatically.
apiVersion: unified-cd/v1
kind: Job
metadata:
  name: private-template-job
spec:
  steps:
    - name: buildWithPrivateTemplate
      uses:
        # private repo — github-org credential is applied automatically
        job: git://github.com/my-private-org/ci-templates/jobs/build.yaml@v1.0.0
        with:
          target: ./cmd/...

    - name: deployWithPrivateTemplate
      needs: [buildWithPrivateTemplate]
      uses:
        # different host — gitlab-internal credential is applied automatically
        job: git://gitlab.example.com/infra/ci-templates/jobs/deploy.yaml@main
        with:
          environment: production
