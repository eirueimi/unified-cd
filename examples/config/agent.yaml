# unified-cd agent configuration file
# Usage: agent -f agent-config.yaml
#
# Priority: CLI flags > this file > environment variables
# All fields are optional; omit to fall back to env vars or defaults.

server: http://unified-cd-master:8080
token: your-agent-token
id: my-agent-1
labels:
  - kind:linux
  - env:prod

# pauseImage: image for the claim pod's pause (netns-holder) container, one per claim.
# pauseImage: busybox:1.36

# runnerImage: primary container image injected into the claim pod when an isolated job's
# podTemplate defines no container of its own.
# runnerImage: ghcr.io/eirueimi/unified-cd-runner:v0.0.3

# Garage cache (all fields required to enable cache; omit section to disable)
cacheEndpoint: garage:3900
cacheKey: garageadmin
cacheSecret: garageadmin12345
cacheBucket: unified-cd-cache
