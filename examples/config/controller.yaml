# unified-cd controller configuration file
# Usage: controller -f controller-config.yaml
#
# Priority: CLI flags > this file > environment variables
# All fields are optional; omit to fall back to env vars or defaults.

dsn: postgres://unified:password@postgres:5432/unified_cd?sslmode=disable
addr: :8080
token: your-static-token

# The encryption key is supplied outside this file:
#   UNIFIED_CONTROLLER_KEY_FILE=/etc/unified-cd/kek   (generate with `unified-cli keygen --out`)
# or UNIFIED_KMS_URI=hashivault://unified-cd-kek

# S3-compatible object store for log archival and cache (optional)
s3Endpoint: garage:3900
s3Bucket: unified-cd
s3Key: garageadmin
s3Secret: garageadmin12345

# Local object store alternative to S3 (mutually exclusive with s3*)
# dataDir: /var/lib/unified-cd

# Kubernetes workload enrollment for k8s-agent Pods. With no kubeconfig, the
# controller uses its in-cluster ServiceAccount identity.
agentAuth:
  kubernetesClusters:
    - name: in-cluster
  kubernetesEnrollmentPolicies:
    - name: unified-cd-k8s-agents
      cluster: in-cluster
      namespaces: [unified-cd]
      serviceAccounts: [unified-cd-k8s-agent]
      allowedLabels: [kind:kubernetes]
      requiredLabels: [kind:kubernetes]
      accessTokenTTL: 1h
      enabled: true

# OIDC SSO (optional)
# oidc:
#   issuer: https://accounts.google.com
#   issuerInternal: ""        # override for in-cluster IdP access
#   clientId: your-client-id
#   clientSecret: your-client-secret
