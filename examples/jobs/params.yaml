# Demonstrates: parameterized jobs with inputs, outputs, and step output references
# Usage:
#   unified-cd apply -f examples/jobs/params.yaml
#   unified-cd run trigger build --param image=myapp --param tag=v1.0.0
apiVersion: unified-cd/v1
kind: Job
metadata:
  name: build
spec:
  # docker builds need the host's docker daemon — run natively
  native: true
  params:
    inputs:
      - name: image
        type: string
        required: true
      - name: tag
        type: string
        default: latest
    outputs:
      - name: image_ref
        type: string
  agentSelector:
    - kind:docker
  steps:
    # Demo scaffolding so this example builds anywhere: write a throwaway Dockerfile.
    # A real job would already have its own Dockerfile in the checked-out source.
    - name: prepare
      run: |
        set -e
        printf 'FROM alpine:3\nCMD ["true"]\n' > Dockerfile
    - name: build
      run: |
        set -e
        docker build -t {{ .Params.image }}:{{ .Params.tag }} .
        echo "Built: {{ .Params.image }}:{{ .Params.tag }}"
      outputs:
        image_ref: "{{ .Params.image }}:{{ .Params.tag }}"

    # There is no registry in the local demo, so this only echoes. A real job would run:
    #   docker push {{ .Steps.build.Outputs.image_ref }}
    - name: push
      run: echo "Would push {{ .Steps.build.Outputs.image_ref }}"
