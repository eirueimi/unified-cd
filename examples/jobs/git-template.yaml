# Demonstrates: reusing steps from a remote Git repository using uses:.
# The referenced YAML's steps are inlined into THIS run (sharing its workspace)
# by the controller before the run is queued — contrast with call:, which runs
# a registered job as an independent child run (see examples/jobs/call-template.yaml).
#
# uses: targets must be `kind: JobTemplate` — a strict schema holding only what
# inlining can honor (description/params/shell/podTemplate.spec.{containers,volumes}/steps).
# Pointing uses: at a `kind: Job` fails at run creation with a conversion hint.
# See templates/README.md and docs/jobs.md.
#
# The steps below fetch a real template (this repository's
# templates/smoke-check.yaml), so this example actually runs.
# Usage:
#   unified-cd apply -f examples/jobs/git-template.yaml
#   unified-cd apply -f examples/resources/gitcredential.yaml  # for private repos only
#   unified-cd run trigger git-template-demo
#
# URI format: git://host/owner/repo/path/to/template.yaml@ref
#   - ref can be a semver tag (v1.2.3), full commit SHA (40 chars), or a branch name
#   - semver tags and commit SHAs are cached in the object store; fetched only once
#   - branch names are always fetched fresh on every run
#   - a 40-char commit SHA behaves exactly like a tag (pinned + cached). Pin to
#     any commit at or after the kind: JobTemplate migration, e.g. the commit a
#     tag points at: `git rev-parse 'v0.2.0^{commit}'`.
---
apiVersion: unified-cd/v1
kind: Job
metadata:
  name: git-template-demo
spec:
  agentSelector:
    - kind:docker
  steps:
    # public repo template — no authentication needed
    - name: smokeFromTag
      uses:
        # semver tag → cached in the object store after the first fetch.
        # v0.2.0 is the first tag where templates/ are kind: JobTemplate; older
        # tags (v0.1.0) predate the migration and are rejected by the kind gate.
        job: git://github.com/eirueimi/unified-cd/templates/smoke-check.yaml@v0.2.0
        with:
          url: "https://github.com"
          # NOTE: template input defaults ARE applied on the uses: (inline)
          # path, same as call: — smoke-check.yaml declares expect_status
          # (default "200") and body_contains (default ""), so both could be
          # omitted here. They're spelled out explicitly for documentation;
          # a non-empty with: value overrides the template's declared default
          # (an empty string counts as unset and falls back to the default).
          expect_status: "200"
          retries: "3"
          interval_seconds: "2"
          body_contains: "GitHub"

    # branch reference — always fetches the latest commit, never cached
    - name: smokeFromBranch
      uses:
        job: git://github.com/eirueimi/unified-cd/templates/smoke-check.yaml@main
        with:
          url: "https://github.com"
          expect_status: "200"
          retries: "3"
          interval_seconds: "2"
          body_contains: "GitHub"

---
# Demonstrates: post: steps — cleanup that runs in LIFO order after the DAG completes.
# post: failures do not affect the overall Run status. The commands are local
# file operations so the example runs anywhere.
apiVersion: unified-cd/v1
kind: Job
metadata:
  name: post-step-demo
spec:
  agentSelector:
    - kind:docker
  steps:
    - name: checkout
      run: |
        set -e
        mkdir -p myapp
        echo "package main" > myapp/main.txt
        echo "Checked out (pretend)"
      # cleanup runs in reverse order after the DAG finishes
      post:
        run: |
          echo "post(checkout): removing myapp"
          rm -rf myapp

    - name: build
      run: |
        set -e
        mkdir -p myapp/bin
        echo "binary" > myapp/bin/app
        echo "Built (pretend)"
      post:
        run: |
          echo "post(build): cleaning build artifacts"
          rm -rf myapp/bin

    - name: test
      run: |
        set -e
        test -f myapp/bin/app
        echo "Tests passed (pretend)"
      post:
        env:
          WORKSPACE: myapp
        run: |
          echo "post(test): clearing test cache in $WORKSPACE"

# Execution order: checkout → build → test
# Post execution order (LIFO): test.post → build.post → checkout.post
