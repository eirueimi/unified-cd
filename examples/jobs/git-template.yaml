# Demonstrates: reusing job steps from a remote Git repository using uses:
# Usage:
#   unified-cd apply -f examples/jobs/git-template.yaml
#   unified-cd apply -f examples/resources/gitcredential.yaml  # for private repos
#   unified-cd run trigger git-template-demo
#
# URI format: git://host/owner/repo/path/to/job.yaml@ref
#   - ref can be a semver tag (v1.2.3), full commit SHA (40 chars), or a branch name
#   - semver tags and commit SHAs are cached in the object store; fetched only once
#   - branch names are always fetched fresh on every run
---
apiVersion: unified-cd/v1
kind: Job
metadata:
  name: git-template-demo
spec:
  steps:
    # public repo template — no authentication needed
    - name: lintFromTemplate
      uses:
        # semver tag → cached in the object store after the first fetch
        job: git://github.com/example-org/ci-templates/jobs/lint.yaml@v2.1.0
        with:
          language: go
          target: ./...

    # branch reference — always fetches the latest commit, never cached
    - name: securityScanFromTemplate
      uses:
        job: git://github.com/example-org/ci-templates/jobs/security-scan.yaml@main
        with:
          severity: HIGH

    # commit SHA reference — fully pinned, cached like a semver tag
    - name: buildFromTemplate
      uses:
        # 40-char commit SHA → cached the same way as semver tags
        job: git://github.com/example-org/ci-templates/jobs/docker-build.yaml@a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
        with:
          image: myapp
          tag: latest

---
# Demonstrates: post: steps — cleanup that runs in LIFO order after the DAG completes.
# post: failures do not affect the overall Run status.
apiVersion: unified-cd/v1
kind: Job
metadata:
  name: post-step-demo
spec:
  steps:
    - name: checkout
      run: |
        git clone https://github.com/example-org/myapp /workspace/myapp
        echo "Cloned successfully"
      # cleanup runs in reverse order after the DAG finishes
      post:
        run: rm -rf /workspace/myapp

    - name: build
      run: |
        cd /workspace/myapp
        go build ./...
      post:
        run: |
          echo "Build artifacts cleaned up"
          rm -rf /workspace/myapp/bin

    - name: test
      run: |
        cd /workspace/myapp
        go test ./...
      post:
        env:
          WORKSPACE: /workspace/myapp
        run: |
          echo "Removing test cache in $WORKSPACE"
          go clean -testcache

# Execution order: checkout → build → test
# Post execution order (LIFO): test.post → build.post → checkout.post
