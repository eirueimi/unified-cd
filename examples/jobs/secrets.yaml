# Demonstrates: injecting secrets into step environment variables with automatic log masking
# Usage:
#   unified-cd secret set registry-user <value>
#   unified-cd secret set registry-password <value>
#   unified-cd secret set database-url <value>
#   unified-cd secret set api-key <value>
#   unified-cd apply -f examples/jobs/secrets.yaml
#   unified-cd run trigger deploy-with-secrets
apiVersion: unified-cd/v1
kind: Job
metadata:
  name: deploy-with-secrets
spec:
  # docker login needs the host's docker daemon — run natively (see docs/migration-2026-07-job-isolation.md)
  native: true
  agentSelector:
    - kind:docker
  steps:
    # secrets are expanded into env: values using {{ .Secrets.NAME }}
    # secret values are automatically masked in log output
    - name: login
      env:
        REGISTRY_USER: "{{ .Secrets.registry-user }}"
        REGISTRY_PASS: "{{ .Secrets.registry-password }}"
      run: |
        echo "$REGISTRY_PASS" | docker login registry.example.com \
          -u "$REGISTRY_USER" --password-stdin
        echo "Login successful"

    - name: deploy
      env:
        DATABASE_URL: "{{ .Secrets.database-url }}"
        API_KEY: "{{ .Secrets.api-key }}"
      run: |
        echo "Deploying with database: $DATABASE_URL"
