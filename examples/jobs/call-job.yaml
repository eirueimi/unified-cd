# Demonstrates: calling one job from another using call:, passing params and reading outputs.
# Also demonstrates foreach: for multi-target deployment.
# The callee "build-service" job is simplified to echoes so the pipeline runs anywhere; for a
# real docker build/push callee see examples/jobs/params.yaml (its "build" job).
#
# Single-agent note: deploy-pipeline occupies an agent slot while it waits for the
# build runs it calls, so a lone agent must allow at least two concurrent runs
# (agent flag --max-concurrent 2) or you need a second agent — otherwise the child
# runs stay Queued and the parent waits forever.
# Usage:
#   unified-cd apply -f examples/jobs/call-job.yaml
#   unified-cd run trigger deploy-pipeline --param version=v1.2.3
---
# caller: deploy-pipeline calls the build-service job twice in parallel, then deploys
apiVersion: unified-cd/v1
kind: Job
metadata:
  name: deploy-pipeline
spec:
  params:
    inputs:
      - name: version
        type: string
        required: true
  agentSelector:
    - kind:docker
  steps:
    - parallel:
      - name: buildFrontend
        call:
          job: build-service
          with:
            image: myapp-frontend
            tag: "{{ .Params.version }}"
      - name: buildBackend
        call:
          job: build-service
          with:
            image: myapp-backend
            tag: "{{ .Params.version }}"

    - name: deploy
      run: |
        set -e
        echo "frontend: {{ .Steps.buildFrontend.Outputs.image_ref }}"
        echo "backend:  {{ .Steps.buildBackend.Outputs.image_ref }}"
        echo "Deploying version {{ .Params.version }}..."

---
# callee: reusable build-service job (echoes so it runs anywhere; params.yaml shows the real docker build)
apiVersion: unified-cd/v1
kind: Job
metadata:
  name: build-service
spec:
  params:
    inputs:
      - name: image
        type: string
        required: true
      - name: tag
        type: string
        default: latest
    outputs:
      - name: image_ref
        type: string
  agentSelector:
    - kind:docker
  steps:
    - name: build
      run: echo "Building {{ .Params.image }}:{{ .Params.tag }}"
      outputs:
        image_ref: "{{ .Params.image }}:{{ .Params.tag }}"

    - name: push
      run: echo "Would push {{ .Steps.build.Outputs.image_ref }}"
---
# foreach example: deploy to multiple environments in parallel
apiVersion: unified-cd/v1
kind: Job
metadata:
  name: multi-env-deploy
spec:
  params:
    inputs:
      - name: envs
        type: array   # JSON array e.g. '["prod","staging","dev"]'
  agentSelector:
    - kind:docker
  steps:
    - name: build
      run: echo "Building myapp"

    - name: deploy
      foreach:
        key: env
        in: $envs     # expanded at runtime from the array param
      call:
        job: build-service    # reuse the build-service job as a stand-in
        with:
          image: myapp
          tag: "{{ .Foreach.env }}"
