# Demonstrates: conditional step execution using if: expressions
# The commands below are simplified to echoes so the example runs anywhere; the
# point is which steps run for a given env, not what each command does.
# Usage:
#   unified-cd apply -f examples/jobs/step-condition.yaml
#   unified-cd run trigger build-and-deploy --param env=staging
#   unified-cd run trigger build-and-deploy --param env=production
apiVersion: unified-cd/v1
kind: Job
metadata:
  name: build-and-deploy
spec:
  params:
    inputs:
      - name: env
        type: string
        default: staging   # staging | production
  agentSelector:
    - kind:docker
  steps:
    - name: build
      run: |
        echo "ok"
      outputs:
        result: "{{ .Stdout | grep \"ok\" | trim }}"

    - parallel:
      - name: integrationTest
        if: 'params.env != "production"'
        run: echo "Running integration tests (env={{ .Params.env }})"

      - name: deploy
        if: 'params.env == "production"'
        run: echo "Deploying to production"

      # Note: use {{ .Params.env }} (rendered before the shell runs), not the
      # shell form ${params.env}, which sh rejects as a bad substitution.
      - name: notify
        if: 'steps.build.outputs.result == "ok"'
        run: echo "Notify build finished for env={{ .Params.env }}"

    - name: smokeTest
      if: 'params.env in ["production", "staging"]'
      run: echo "Running smoke tests (env={{ .Params.env }})"
